<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Office Task Management</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#ecf0f3;
margin:0;
}

header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
margin:auto;
margin-top:20px;
}

.dashboard{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:center;
}

.form{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.2);
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
}

button{
background:#0066cc;
color:white;
padding:10px;
border:none;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:green;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

table th{
background:#003366;
color:white;
padding:10px;
}

table td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.search{
margin-bottom:15px;
}

.delete{
background:red;
}

</style>

</head>

<body>

<header>

<h1>CA OFFICE TASK MANAGEMENT SOFTWARE</h1>

</header>

<div class="container">

<div class="dashboard">

<div class="card">
<h2 id="total">1</h2>
Total Tasks
</div>

<div class="card">
<h2 id="pending">1</h2>
Pending
</div>

<div class="card">
<h2 id="completed">0</h2>
Completed
</div>

</div>

<div class="form">

<h2>Add New Task</h2>

<input id="client" placeholder="Client Name">

<select id="task">

<option>GST Return</option>
<option>Income Tax Return</option>
<option>TDS Return</option>
<option>Audit</option>
<option>Tax Audit</option>
<option>ROC Filing</option>
<option>Accounting</option>
<option>Payroll</option>
<option>Appeal</option>
<option>Notice Reply</option>

</select>

<input id="employee" placeholder="Assigned Employee">

<input type="date" id="due">

<select id="priority">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<button onclick="addTask()">Add Task</button>

</div>

<input class="search" id="search" placeholder="Search Client..." onkeyup="searchTask()">

<table>

<thead>

<tr>

<th>Client</th>
<th>Task</th>
<th>Employee</th>
<th>Due</th>
<th>Priority</th>
<th>Status</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="tableBody">

<tr>

<td>ppp</td>

<td>GST Return</td>

<td>chithra</td>

<td>1211-12-13</td>

<td>High</td>

<td>

<select onchange="changeStatus(0,this.value)">

<option selected="">Pending</option>

<option>In Progress</option>

<option>Completed</option>

</select>

</td>

<td>

<button class="delete" onclick="removeTask(0)">Delete</button>

</td>

</tr>

</tbody>

</table>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

showTasks();

function addTask(){

let client=document.getElementById("client").value;

let task=document.getElementById("task").value;

let emp=document.getElementById("employee").value;

let due=document.getElementById("due").value;

let priority=document.getElementById("priority").value;

if(client==""||emp==""){

alert("Please enter Client and Employee");

return;

}

tasks.push({

client:client,

task:task,

employee:emp,

due:due,

priority:priority,

status:"Pending"

});

save();

document.getElementById("client").value="";
document.getElementById("employee").value="";
document.getElementById("due").value="";

showTasks();

}

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks));

}

function showTasks(){

let html="";

let pending=0;

let completed=0;

tasks.forEach((t,i)=>{

if(t.status=="Pending")
pending++;

if(t.status=="Completed")
completed++;

html+=`

<tr>

<td>${t.client}</td>

<td>${t.task}</td>

<td>${t.employee}</td>

<td>${t.due}</td>

<td>${t.priority}</td>

<td>

<select onchange="changeStatus(${i},this.value)">

<option ${t.status=="Pending"?"selected":""}>Pending</option>

<option ${t.status=="In Progress"?"selected":""}>In Progress</option>

<option ${t.status=="Completed"?"selected":""}>Completed</option>

</select>

</td>

<td>

<button class="delete" onclick="removeTask(${i})">Delete</button>

</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=html;

document.getElementById("total").innerHTML=tasks.length;

document.getElementById("pending").innerHTML=pending;

document.getElementById("completed").innerHTML=completed;

save();

}

function removeTask(i){

if(confirm("Delete this task?")){

tasks.splice(i,1);

showTasks();

}

}

function changeStatus(i,s){

tasks[i].status=s;

showTasks();

}

function searchTask(){

let value=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#tableBody tr");

rows.forEach(function(r){

r.style.display=r.innerText.toLowerCase().includes(value)?"":"none";

});

}

</script>


</body></html>
